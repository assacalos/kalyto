# Configuration Nginx pour EasyConnect Web
# Placez ce fichier dans /etc/nginx/sites-available/easyconnect
# Puis créez un lien symbolique : ln -s /etc/nginx/sites-available/easyconnect /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name easyconnect.votredomaine.com;
    
    # Rediriger HTTP vers HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name easyconnect.votredomaine.com;
    
    # Certificats SSL (Let's Encrypt recommandé)
    ssl_certificate /etc/letsencrypt/live/votredomaine.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/votredomaine.com/privkey.pem;
    
    # Configuration SSL optimisée
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # Racine du site
    root /var/www/easyconnect;
    index index.html;
    
    # Taille maximale des fichiers uploadés
    client_max_body_size 50M;
    
    # Logs
    access_log /var/log/nginx/easyconnect_access.log;
    error_log /var/log/nginx/easyconnect_error.log;
    
    # Headers de sécurité
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    
    # Routing Flutter - Toutes les routes vers index.html
    location / {
        try_files $uri $uri/ /index.html;
        
        # Pas de cache pour index.html
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
    
    # Cache agressif pour les assets statiques (JS, CSS, images, fonts)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # Service Worker - Pas de cache
    location ~ ^/(flutter_service_worker\.js|firebase-messaging-sw\.js)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
    
    # Manifest et favicon
    location ~ ^/(manifest\.json|favicon\.png)$ {
        add_header Cache-Control "public, max-age=86400";
    }
    
    # Compression gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
    
    # Protection contre les attaques
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

