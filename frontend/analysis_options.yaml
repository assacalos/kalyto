# Analyse statique — Kalyto (Flutter)
# Base : recommandations officielles Flutter
# https://dart.dev/tools/linter-rules

include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - build/**
    - .dart_tool/**
  # Éviter de durcir tout de suite (beaucoup de bruit sur un gros projet) :
  # language:
  #   strict-casts: true
  #   strict-inference: true
  #   strict-raw-types: true

linter:
  rules:
    # --- Phase « douce » : style sûr, peu de faux positifs ---
    annotate_overrides: true
    curly_braces_in_flow_control_structures: true
    unnecessary_string_interpolations: true
    prefer_final_fields: true
    prefer_conditional_assignment: true
    # Déjà souvent présent via flutter_lints ; explicite pour la doc d’équipe :
    unnecessary_this: true

    # --- À activer plus tard (roadmap qualité) ---
    # Remplacer print par AppLogger / debugPrint puis :
    # avoid_print: true
    # Après migration Color.withOpacity → withValues(alpha: …) :
    # (souvent signalé comme deprecated_member_use)
    # Corriger les await après mounted / context :
    # use_build_context_synchronously: true
    # Renommer bottomBar.dart → bottom_bar.dart etc. :
    # file_names: true
    # prefer_single_quotes: true  # si vous standardisez les quotes

# Détails : voir docs/ANALYSIS.md
